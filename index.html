<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arbres d'Interès Local · Barcelona</title>
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f4f0;--surface:#fff;--border:#e0ddd6;
      --text:#1a1a18;--muted:#8a8880;
      --green:#2d5a3d;--brown:#7a4a1e;--amber:#c8401a;
      --shadow:0 2px 12px rgba(0,0,0,.08);--radius:6px;
      --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
    }
    html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text)}
    #map{position:absolute;inset:0}

    /* HEADER */
    #header{
      position:absolute;top:16px;left:50%;transform:translateX(-50%);
      z-index:10;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);box-shadow:var(--shadow);
      padding:10px 20px;display:flex;align-items:center;gap:14px;
      pointer-events:none;white-space:nowrap;
    }
    #header .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
    #header h1{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
    #header .sub{font-family:var(--mono);font-size:11px;color:var(--muted);border-left:1px solid var(--border);padding-left:14px}

    /* SEARCH */
    #search-box{position:absolute;top:16px;right:16px;z-index:10;width:230px;display:flex;flex-direction:column;gap:4px}
    #search-input{
      width:100%;padding:9px 12px;font-family:var(--sans);font-size:13px;
      border:1px solid var(--border);border-radius:var(--radius);
      background:var(--surface);color:var(--text);box-shadow:var(--shadow);outline:none;transition:border-color .2s
    }
    #search-input::placeholder{color:var(--muted)}
    #search-input:focus{border-color:var(--green)}
    #search-results{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);box-shadow:var(--shadow);
      display:none;max-height:280px;overflow-y:auto;
      right:0;
    }
    .si{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
    .si:last-child{border-bottom:none}
    .si:hover{background:var(--bg)}
    .si strong{display:block;font-weight:500;font-size:13px}
    .si span{color:var(--muted);font-family:var(--mono);font-size:11px}

    /* PANEL */
    #panel{position:absolute;top:16px;left:16px;z-index:10;display:flex;flex-direction:column;gap:8px;width:228px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .ch{padding:9px 12px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg)}
    .cb{padding:10px 12px}
    .li{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
    .li:last-child{border-bottom:none}
    .ll{display:flex;align-items:center;gap:8px;font-size:13px}
    .sw{width:14px;height:14px;border-radius:3px;flex-shrink:0}
    .toggle{position:relative;width:34px;height:18px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .tt{position:absolute;inset:0;background:var(--border);border-radius:18px;cursor:pointer;transition:background .2s}
    .tt::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
    .toggle input:checked+.tt{background:var(--green)}
    .toggle input:checked+.tt::before{transform:translateX(16px)}

    /* LEGEND */
    .leg{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
    .ld{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid transparent}

    /* STATS */
    .stats-row{display:flex;gap:8px}
    .stat-box{flex:1;padding:8px 10px;border-radius:4px;background:var(--bg);border:1px solid var(--border)}
    .stat-num{font-family:var(--mono);font-size:18px;font-weight:500}
    .stat-lbl{font-size:10px;color:var(--muted);margin-top:1px;line-height:1.3}

    /* POPUP */
    .maplibregl-popup-content{font-family:var(--sans)!important;font-size:13px!important;border-radius:var(--radius)!important;border:1px solid var(--border)!important;box-shadow:var(--shadow)!important;padding:0!important;max-width:270px!important}
    .maplibregl-popup-close-button{font-size:16px!important;color:var(--muted)!important;padding:4px 8px!important}
    .pi{padding:12px 14px}
    .pic{font-size:20px;margin-bottom:6px}
    .pt{font-weight:600;font-size:14px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);line-height:1.3}
    .ptag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;margin-bottom:8px}
    .pr{display:flex;gap:8px;align-items:flex-start;padding:3px 0;font-size:12px}
    .pk{color:var(--muted);font-family:var(--mono);font-size:11px;flex-shrink:0;min-width:72px;padding-top:1px}
    .pv{line-height:1.4}

    /* COORDS */
    #coords{
      position:absolute;bottom:52px;left:16px;z-index:10;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--muted);pointer-events:none;white-space:nowrap
    }

    /* BASEMAP */
    #bm{position:absolute;bottom:16px;left:16px;z-index:10;display:flex;gap:4px}
    .bb{padding:6px 10px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
    .bb:hover{color:var(--text);border-color:var(--text)}
    .bb.active{background:var(--text);color:#fff;border-color:var(--text)}
    .maplibregl-ctrl-group{border-radius:var(--radius)!important;border:1px solid var(--border)!important;box-shadow:var(--shadow)!important;overflow:hidden}
    .maplibregl-ctrl-bottom-left{left:200px!important}
  </style>
</head>
<body>
<div id="map"></div>

<div id="header">
  <div class="dot"></div>
  <h1>Visor GIS</h1>
  <span class="sub">Patrimoni verd · Barcelona</span>
</div>

<div id="search-box">
  <input id="search-input" type="text" placeholder="Cercar arbre, espai o adreça…" autocomplete="off"/>
  <div id="search-results"></div>
</div>

<div id="panel">
  <!-- CAPES -->
  <div class="card">
    <div class="ch">Capes</div>
    <div class="cb">
      <div class="li">
        <div class="ll">
          <div class="sw" style="background:var(--green);border-radius:50%"></div>
          Arbres d'interès local
        </div>
        <label class="toggle"><input type="checkbox" checked onchange="toggleLayer('arbres',this.checked)"><span class="tt"></span></label>
      </div>
      <div class="li">
        <div class="ll">
          <div class="sw" style="background:var(--brown);border-radius:50%"></div>
          Bio-troncs
        </div>
        <label class="toggle"><input type="checkbox" checked onchange="toggleLayer('biotroncs',this.checked)"><span class="tt"></span></label>
      </div>
      <div class="li">
        <div class="ll">
          <div class="sw" style="background:var(--amber);border-radius:50%"></div>
          Cúmuls de troncs
        </div>
        <label class="toggle"><input type="checkbox" checked onchange="toggleLayer('cumuls',this.checked)"><span class="tt"></span></label>
      </div>
      <div class="li">
        <div class="ll">
          <div class="sw" style="background:#1a4a6b;border-radius:2px;opacity:.7"></div>
          Districtes
        </div>
        <label class="toggle"><input type="checkbox" checked onchange="toggleLayer('districtes',this.checked)"><span class="tt"></span></label>
      </div>
      <div class="li">
        <div class="ll">
          <div class="sw" style="background:var(--green);border-radius:50%;opacity:.35"></div>
          Clústers (arbres)
        </div>
        <label class="toggle"><input type="checkbox" checked onchange="toggleLayer('clusters',this.checked)"><span class="tt"></span></label>
      </div>
    </div>
  </div>

  <!-- LLEGENDA -->
  <div class="card">
    <div class="ch">Llegenda</div>
    <div class="cb">
      <div class="leg"><div class="ld" style="background:var(--green)"></div>Arbre d'interès local</div>
      <div class="leg"><div class="ld" style="background:var(--brown)"></div>Bio-tronc</div>
      <div class="leg"><div class="ld" style="background:var(--amber)"></div>Cúmul de troncs</div>
      <div class="leg"><div class="ld" style="background:#1a4a6b;opacity:.5;border-radius:2px;width:16px;height:10px"></div>Límit de districte</div>
    </div>
  </div>

  <!-- RECOMPTE -->
  <div class="card">
    <div class="ch">Recompte</div>
    <div class="cb">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" style="color:var(--green)">208</div>
          <div class="stat-lbl">Arbres d'interès</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--brown)">35</div>
          <div class="stat-lbl">Biotroncs i cúmuls</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="coords">Lat: — | Lon: —</div>
<div id="bm">
  <button class="bb active" onclick="setBM('osm',this)">OSM</button>
  <button class="bb" onclick="setBM('topo',this)">Topo</button>
  <button class="bb" onclick="setBM('carto',this)">Clar</button>
  <button class="bb" onclick="setBM('sat',this)">Sat</button>
</div>

const BM = {
  osm:  ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
  topo: ['https://tile.opentopomap.org/{z}/{x}/{y}.png'],
  carto:['https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'],
  sat:  ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}']
};

const map = new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    sources:{basemap:{type:'raster',tiles:BM.osm,tileSize:256,attribution:'© OpenStreetMap'}},
    layers:[{id:'basemap',type:'raster',source:'basemap'}]
  },
  center:[2.168,41.393],zoom:12,
  attributionControl:false
});

map.addControl(new maplibregl.NavigationControl(),'bottom-right');
map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-left');
map.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');

map.on('load',()=>{
  // Centra als arbres
  const lngs=ARBRES.features.map(f=>f.geometry.coordinates[0]);
  const lats=ARBRES.features.map(f=>f.geometry.coordinates[1]);
  map.fitBounds([[Math.min(...lngs),Math.min(...lats)],[Math.max(...lngs),Math.max(...lats)]],{padding:60,maxZoom:13});

  // ── DISTRICTES (primer, al fons) ──
  map.addSource('dist-src',{type:'geojson',data:DISTRICTES});
  map.addLayer({id:'dist-fill',type:'fill',source:'dist-src',
    paint:{'fill-color':'#1a4a6b','fill-opacity':0.07}});
  map.addLayer({id:'dist-line',type:'line',source:'dist-src',
    paint:{'line-color':'#1a4a6b','line-width':1.8,'line-opacity':0.6}});
  map.addLayer({id:'dist-label',type:'symbol',source:'dist-src',
    layout:{
      'text-field':['get','nom'],
      'text-font':['Open Sans Bold','Arial Unicode MS Bold'],
      'text-size':11,'text-transform':'uppercase',
      'text-letter-spacing':0.08,
      'text-max-width':8
    },
    paint:{'text-color':'#1a4a6b','text-opacity':0.75,'text-halo-color':'#ffffff','text-halo-width':2}
  });

  // ── ARBRES (per sobre dels districtes) ──
  map.addSource('arbres-src',{type:'geojson',data:ARBRES,cluster:true,clusterMaxZoom:14,clusterRadius:40});

  map.addLayer({id:'cl-halo',type:'circle',source:'arbres-src',filter:['has','point_count'],
    paint:{'circle-color':'#2d5a3d','circle-opacity':.15,'circle-radius':['step',['get','point_count'],26,10,36,50,48]}});
  map.addLayer({id:'cl-inner',type:'circle',source:'arbres-src',filter:['has','point_count'],
    paint:{'circle-color':'#2d5a3d','circle-opacity':.75,'circle-radius':['step',['get','point_count'],14,10,20,50,28]}});
  map.addLayer({id:'cl-count',type:'symbol',source:'arbres-src',filter:['has','point_count'],
    layout:{'text-field':'{point_count_abbreviated}','text-font':['Open Sans Bold','Arial Unicode MS Bold'],'text-size':12},
    paint:{'text-color':'#fff'}});
  map.addLayer({id:'arbres-outer',type:'circle',source:'arbres-src',filter:['!',['has','point_count']],
    paint:{'circle-radius':9,'circle-color':'#fff'}});
  map.addLayer({id:'arbres',type:'circle',source:'arbres-src',filter:['!',['has','point_count']],
    paint:{'circle-radius':7,'circle-color':'#2d5a3d','circle-stroke-width':2,'circle-stroke-color':'#fff'}});

  // ── BIOTRONCS ──
  map.addSource('bio-src',{type:'geojson',data:BIOTRONCS});

  // Cúmuls de troncs — taronja
  map.addLayer({id:'cumuls-outer',type:'circle',source:'bio-src',
    filter:['==',['get','tipus'],'CÚMUL DE TRONCS'],
    paint:{'circle-radius':9,'circle-color':'#fff'}});
  map.addLayer({id:'cumuls',type:'circle',source:'bio-src',
    filter:['==',['get','tipus'],'CÚMUL DE TRONCS'],
    paint:{'circle-radius':7,'circle-color':'#c8401a','circle-stroke-width':2,'circle-stroke-color':'#fff'}});

  // Bio-troncs — marró
  map.addLayer({id:'biotroncs-outer',type:'circle',source:'bio-src',
    filter:['==',['get','tipus'],'BIO-TRONCS'],
    paint:{'circle-radius':9,'circle-color':'#fff'}});
  map.addLayer({id:'biotroncs',type:'circle',source:'bio-src',
    filter:['==',['get','tipus'],'BIO-TRONCS'],
    paint:{'circle-radius':7,'circle-color':'#7a4a1e','circle-stroke-width':2,'circle-stroke-color':'#fff'}});

  initEvents();
  initSearch();
});

// ── POPUP ──
const popup = new maplibregl.Popup({closeButton:true,closeOnClick:false,offset:14});

function showArbrePopup(lngLat,p){
  const addr=(p.addresse_3||'')+(p.addresse_4?' '+p.addresse_4:'');
  popup.setLngLat(lngLat).setHTML(`
    <div class="pi">
      <div class="pic">🌳</div>
      <div class="pt">${p.name||'Arbre sense nom'}</div>
      <div class="pr"><span class="pk">adreça</span><span class="pv">${addr||'—'}</span></div>
      <div class="pr"><span class="pk">barri</span><span class="pv">${p.barri||'—'}</span></div>
      <div class="pr"><span class="pk">districte</span><span class="pv">${p.districte||'—'}</span></div>
    </div>`).addTo(map);
}

function showBioPopup(lngLat,p){
  const isBio = p.tipus==='BIO-TRONCS';
  const color = isBio?'#7a4a1e':'#c8401a';
  const icon  = isBio?'🪵':'🌲';
  popup.setLngLat(lngLat).setHTML(`
    <div class="pi">
      <div class="pic">${icon}</div>
      <div class="ptag" style="background:${color}22;color:${color}">${p.tipus||'—'}</div>
      <div class="pt">${p.nom_espai||p.localitzacio||'Sense nom'}</div>
      <div class="pr"><span class="pk">localització</span><span class="pv">${p.localitzacio||'—'}</span></div>
      <div class="pr"><span class="pk">barri</span><span class="pv">${p.barri||'—'}</span></div>
      <div class="pr"><span class="pk">districte</span><span class="pv">${p.districte||'—'}</span></div>
      <div class="pr"><span class="pk">codi</span><span class="pv" style="font-family:var(--mono);font-size:10px">${p.codi||'—'}</span></div>
    </div>`).addTo(map);
}

// ── EVENTS ──
function initEvents(){
  // Click intel·ligent: prioritza punts sobre polígons
  map.on('click', e => {
    const arbres  = map.queryRenderedFeatures(e.point, {layers:['arbres']});
    const bio     = map.queryRenderedFeatures(e.point, {layers:['biotroncs']});
    const cumuls  = map.queryRenderedFeatures(e.point, {layers:['cumuls']});
    const dist    = map.queryRenderedFeatures(e.point, {layers:['dist-fill']});

    if (arbres.length)       { showArbrePopup(e.lngLat, arbres[0].properties); }
    else if (bio.length)     { showBioPopup(e.lngLat, bio[0].properties); }
    else if (cumuls.length)  { showBioPopup(e.lngLat, cumuls[0].properties); }
    else if (dist.length)    {
      const p = dist[0].properties;
      popup.setLngLat(e.lngLat).setHTML(`
        <div class="pi">
          <div class="pic">🏙️</div>
          <div class="pt">${p.nom}</div>
          <div class="pr"><span class="pk">districte</span><span class="pv">${p.districte}</span></div>
          <div class="pr"><span class="pk">àrea</span><span class="pv">${p.area} km²</span></div>
        </div>`).addTo(map);
    }
  });

  // Cursor
  map.on('mousemove', e => {
    const hits = map.queryRenderedFeatures(e.point, {layers:['arbres','biotroncs','cumuls','dist-fill']});
    const pts  = map.queryRenderedFeatures(e.point, {layers:['arbres','biotroncs','cumuls']});
    map.getCanvas().style.cursor = hits.length ? (pts.length ? 'pointer' : 'pointer') : '';
  });
  map.on('click','biotroncs',e=>showBioPopup(e.lngLat,e.features[0].properties));
  map.on('click','cumuls',e=>showBioPopup(e.lngLat,e.features[0].properties));



  map.on('click','cl-halo',e=>{
    const f=map.queryRenderedFeatures(e.point,{layers:['cl-halo']})[0];
    map.getSource('arbres-src').getClusterExpansionZoom(f.properties.cluster_id,(err,zoom)=>{
      if(!err) map.easeTo({center:f.geometry.coordinates,zoom});
    });
  });
  map.on('mouseenter','cl-halo',()=>map.getCanvas().style.cursor='zoom-in');
  map.on('mouseleave','cl-halo',()=>map.getCanvas().style.cursor='');
}

// ── LAYER TOGGLE ──
const LAYERS = {
  arbres:    ['arbres','arbres-outer'],
  biotroncs: ['biotroncs','biotroncs-outer'],
  cumuls:    ['cumuls','cumuls-outer'],
  clusters:  ['cl-halo','cl-inner','cl-count'],
  districtes: ['dist-fill','dist-line','dist-label']
};
function toggleLayer(id,v){
  const vis=v?'visible':'none';
  (LAYERS[id]||[]).forEach(l=>{if(map.getLayer(l))map.setLayoutProperty(l,'visibility',vis)});
}

// ── SEARCH ──
function initSearch(){
  const inp=document.getElementById('search-input');
  const res=document.getElementById('search-results');

  const allFeatures=[
    ...ARBRES.features.map(f=>{return{...f,_type:'arbre'}})  ,
    ...BIOTRONCS.features.map(f=>{return{...f,_type:'bio'}})
  ];

  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toLowerCase();
    res.innerHTML='';
    if(!q){res.style.display='none';return}

    const hits=allFeatures.filter(f=>{
      const p=f.properties;
      const vals=f._type==='arbre'
        ?[p.name,p.addresse_3,p.barri,p.districte]
        :[p.nom_espai,p.localitzacio,p.barri,p.districte];
      return vals.some(v=>String(v||'').toLowerCase().includes(q));
    }).slice(0,8);

    if(!hits.length){res.style.display='none';return}

    hits.forEach(f=>{
      const p=f.properties;
      const isArbre=f._type==='arbre';
      const icon=isArbre?'🌳':'🪵';
      const title=isArbre?(p.name||'Arbre'):(p.nom_espai||p.localitzacio||'Biotronc');
      const sub=isArbre?(p.addresse_3||p.barri||''):(p.tipus||'');
      const d=document.createElement('div');
      d.className='si';
      d.innerHTML=`<strong>${icon} ${title}</strong><span>${sub}</span>`;
      d.onclick=()=>{
        res.style.display='none';inp.value=title;
        const c=f.geometry.coordinates;
        map.flyTo({center:c,zoom:16,duration:900});
        isArbre?showArbrePopup(c,p):showBioPopup(c,p);
      };
      res.appendChild(d);
    });
    res.style.display='block';
  });

  document.addEventListener('click',e=>{
    if(!document.getElementById('search-box').contains(e.target)) res.style.display='none';
  });
}

// ── COORDS ──
map.on('mousemove',e=>{
  document.getElementById('coords').textContent=`Lat: ${e.lngLat.lat.toFixed(5)} | Lon: ${e.lngLat.lng.toFixed(5)}`;
});

// ── BASEMAP ──
function setBM(id,btn){
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  map.getSource('basemap').setTiles(BM[id]);
}
